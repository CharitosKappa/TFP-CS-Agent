# Local development PostgreSQL for the TFP CS Agent.
# Usage:
#   docker compose up -d        # start the database
#   docker compose down         # stop it (data is kept in the named volume)
#   docker compose down -v      # stop AND delete all data
#
# The connection string this produces is:
#   postgresql://tfp:tfp_local_dev@localhost:5432/tfp_cs_agent?schema=public
# which is what DATABASE_URL in .env points to.
services:
  db:
    image: postgres:16
    container_name: tfp-cs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tfp
      POSTGRES_PASSWORD: tfp_local_dev
      POSTGRES_DB: tfp_cs_agent
    ports:
      - "5432:5432"
    volumes:
      - tfp_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tfp -d tfp_cs_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tfp_pg_data:
